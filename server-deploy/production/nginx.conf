
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Spring Boot 上游
    upstream glimmerseed_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # HTTPS Server
    server {
        listen       443 ssl http2;
        server_name  8.134.80.158;  # 替换为你的域名或公网IP

        # SSL 证书配置
        ssl_certificate      C:/nginx/ssl/server.crt;
        ssl_certificate_key  C:/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 日志
        access_log  C:/nginx/logs/glimmerseed_access.log;
        error_log   C:/nginx/logs/glimmerseed_error.log;

        # 反向代理到 Spring Boot
        location / {
            proxy_pass http://glimmerseed_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://glimmerseed_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTP 强制跳转 HTTPS
    server {
        listen       80;
        server_name  8.134.80.158;  # 替换为你的域名或公网IP
        return       301 https://$server_name$request_uri;
    }
}

