<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("/static/bg_app_background.png");
            background-size: cover;
            background-position: center;
        }
        .login-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 40px 36px;
            width: 340px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: #5A7A90;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #5A7A90;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #D4E3F0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: rgba(255,255,255,0.7);
        }
        .form-group input:focus {
            border-color: #5BA4CF;
            background: #fff;
        }
        .btn-login {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 10px;
            background: #5BA4CF;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .btn-login:hover { background: #3D8ABF; transform: translateY(-1px); }
        .error-msg {
            color: #E74C3C;
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(231,76,60,0.08);
            border-radius: 8px;
        }
        .footer-text {
            text-align: center;
            color: #99AABB;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🔐</div>
        <div class="subtitle">Glimmerseed 管理后台</div>

        {% if error %}
        <div class="error-msg">密码错误，请重试</div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="form-group">
                <label for="password">管理员密码</label>
                <input type="password" id="password" name="password" placeholder="输入密码" required autofocus>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>

        <div class="footer-text">Glimmerseed Admin Panel &middot; FastAPI</div>
    </div>
</body>
</html>
